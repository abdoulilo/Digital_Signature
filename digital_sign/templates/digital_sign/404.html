{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page Not Found | Digital Signature</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <main class="min-vh-100 d-flex align-items-center justify-content-center px-3">
        <div class="card border-0 shadow-sm rounded-4 p-4 text-center" style="max-width: 520px;">
            <div class="card-body">
                <h1 class="display-5 fw-bold mb-3">404</h1>
                <h2 class="h4 mb-3">Page not found</h2>
                <p class="text-muted mb-4">
                    The page you are looking for does not exist, has expired, or the verification link is invalid.
                </p>

                <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                    <a href="{% url 'upload_pdf' %}" class="btn btn-primary px-4">
                        Go to Upload
                    </a>
                    <a href="{% url 'verify_pdf' %}" class="btn btn-outline-secondary px-4">
                        Verify Document
                    </a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
